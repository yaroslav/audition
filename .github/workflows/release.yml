name: Release

# Triggered manually. Builds the gem from the current commit,
# smoke-tests the installed executable, and (only if that passes)
# creates a git tag plus GitHub Release atomically and publishes to
# RubyGems via OIDC trusted publishing.
on:
  workflow_dispatch:

jobs:
  # Read version from version.rb.
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Read version
        id: version
        run: |
          VERSION=$(ruby -e "require_relative 'lib/audition/version'; print Audition::VERSION")
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true

      - name: Build gem
        run: bundle exec rake build

      - name: Smoke-test installed gem
        run: |
          gem install pkg/audition-*.gem
          echo '$counter = 0' > /tmp/hostile.rb
          if audition --plain --static-only /tmp/hostile.rb; then
            echo "expected exit 1 for a hostile script" && exit 1
          fi
          audition --plain --static-only /tmp/hostile.rb \
            | grep -q "not ractor-ready"
          audition --capabilities > /dev/null
          echo "smoke test passed"

      - uses: actions/upload-artifact@v7
        with:
          name: gems-source
          path: pkg/*.gem

  # Publish: create git tag + GitHub Release (atomic) + push to
  # RubyGems via OIDC.
  publish:
    needs: [version, build]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true

      - uses: actions/download-artifact@v8
        with:
          pattern: gems-*
          path: pkg
          merge-multiple: true

      - name: Extract changelog for this version
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" \
            CHANGELOG.md > /tmp/release_notes.md
          if ! grep -q "[^[:space:]]" /tmp/release_notes.md; then
            echo "CHANGELOG.md has no section for ${VERSION}; refusing to release without notes"
            exit 1
          fi
          cat /tmp/release_notes.md

      # Creates the git tag at github.sha and the GitHub Release in
      # one call. If this step fails, no tag is pushed.
      - name: Create git tag and GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.version.outputs.tag }}" \
            --target "${{ github.sha }}" \
            --title "Audition ${{ needs.version.outputs.version }}" \
            --notes-file /tmp/release_notes.md \
            pkg/*.gem

      - name: Configure RubyGems credentials
        uses: rubygems/configure-rubygems-credentials@main

      - name: Push gem to RubyGems
        run: |
          for gem in pkg/*.gem; do
            echo "Pushing ${gem}"
            gem push "${gem}"
          done
